name: Automation Auto Merge

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"
  workflow_run:
    workflows:
      - Build and Validate
    types:
      - completed

concurrency:
  group: automation-auto-merge-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

permissions:
  checks: read
  contents: write
  pull-requests: write
  statuses: read

jobs:
  merge:
    name: Review and Merge Automation Pull Requests
    if: |
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.event == 'pull_request' ||
          github.event.workflow_run.event == 'workflow_dispatch'
        )
      ) ||
      (
        github.event_name != 'workflow_run' &&
        github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
      )
    runs-on: ubuntu-latest

    steps:
      - name: Identify candidate pull requests
        id: candidates
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          WORKFLOW_RUN_PULL_REQUESTS: ${{ toJson(github.event.workflow_run.pull_requests) }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            prs="$(printf '%s\n' "${WORKFLOW_RUN_PULL_REQUESTS:-[]}" | jq -r '.[].number')"
            prs="$(printf '%s\n' "${prs}" | sed '/^$/d')"
            if [ -z "${prs}" ] && [ -n "${WORKFLOW_RUN_HEAD_BRANCH:-}" ]; then
              prs="$(
                gh pr list --state open --head "${WORKFLOW_RUN_HEAD_BRANCH}" --json number,baseRefName \
                  --jq '.[] | select(.baseRefName == "'"${DEFAULT_BRANCH}"'") | .number'
              )"
            fi
          else
            prs="$(
              gh pr list --state open --json number,author,baseRefName,headRefName \
                --jq '.[] | select(.baseRefName == "'"${DEFAULT_BRANCH}"'" and (.author.login == "dependabot[bot]" or .author.login == "dependabot" or .author.login == "app/dependabot" or .author.login == "app/github-actions" or .author.login == "github-actions" or .author.login == "github-actions[bot]")) | .number'
            )"
          fi

          prs="$(printf '%s\n' "${prs}" | sed '/^$/d' | sort -u)"
          count="$(printf '%s\n' "${prs}" | sed '/^$/d' | wc -l | tr -d ' ')"

          {
            echo "count=${count}"
            echo "prs<<EOF"
            printf '%s\n' "${prs}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Review and merge eligible pull requests
        if: steps.candidates.outputs.count != '0'
        env:
          DEFAULT_GH_TOKEN: ${{ github.token }}
          AUTOMATION_AUTOMERGE_TOKEN: ${{ secrets.AUTOMATION_AUTOMERGE_TOKEN || secrets.DEPENDABOT_AUTOMERGE_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          CANDIDATE_PRS: ${{ steps.candidates.outputs.prs }}
          TRIGGERING_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          export GH_TOKEN="${AUTOMATION_AUTOMERGE_TOKEN:-${DEFAULT_GH_TOKEN}}"

          # shellcheck disable=SC2016
          pr_query='
          query($owner: String!, $name: String!, $number: Int!) {
            repository(owner: $owner, name: $name) {
              pullRequest(number: $number) {
                number
                title
                url
                state
                isDraft
                baseRefName
                headRefOid
                mergeable
                mergeStateStatus
                reviewDecision
                author {
                  login
                }
                commits(last: 1) {
                  nodes {
                    commit {
                      statusCheckRollup {
                        contexts(first: 100) {
                          nodes {
                            __typename
                            ... on CheckRun {
                              name
                              status
                              conclusion
                            }
                            ... on StatusContext {
                              context
                              state
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          }'

          escape_markdown() {
            printf '%s' "$1" | sed 's/|/\\|/g'
          }

          merge_result_detail() {
            local title="$1"
            local action="$2"
            local validation_detail="$3"
            local approval_detail="$4"

            # shellcheck disable=SC2016
            if printf '%s' "${title}" | grep -Eq '^(deps|build|ci|release)(\([^)]+\))?:'; then
              printf '%s%s%s' \
                "${action} and left release-bearing conventional commit metadata intact for the automated release flow." \
                "${validation_detail}" \
                "${approval_detail}"
            else
              printf '%s%s%s' \
                "${action} with the original conventional commit title preserved." \
                "${validation_detail}" \
                "${approval_detail}"
            fi
          }

          latest_build_validate_run() {
            local head_sha="$1"

            gh run list \
              --workflow "Build and Validate" \
              --limit 100 \
              --json databaseId,headSha,event,conclusion,url \
              --jq '.[] | select((.event == "pull_request" or .event == "workflow_dispatch") and .headSha == "'"${head_sha}"'" and .conclusion == "success") | @base64' \
              | head -n1
          }

          {
            printf '## Automation Auto Merge\n\n'
            printf '| Pull Request | Result | Details |\n'
            printf '| --- | --- | --- |\n'
          } >> "${GITHUB_STEP_SUMMARY}"

          merged=0
          auto_merged=0
          skipped=0

          while IFS= read -r pr_number; do
            [ -n "${pr_number}" ] || continue

            pr_json="$(
              gh api graphql \
                -f owner="${GITHUB_REPOSITORY_OWNER}" \
                -f name="${GITHUB_REPOSITORY#*/}" \
                -F number="${pr_number}" \
                -f query="${pr_query}" \
                --jq '.data.repository.pullRequest'
            )"

            if [ "${pr_json}" = "null" ]; then
              skipped=$((skipped + 1))
              printf '| #%s | skipped | Pull request no longer exists. |\n' "${pr_number}" >> "${GITHUB_STEP_SUMMARY}"
              continue
            fi

            title="$(jq -r '.title' <<<"${pr_json}")"
            url="$(jq -r '.url' <<<"${pr_json}")"
            author="$(jq -r '.author.login // ""' <<<"${pr_json}")"
            state="$(jq -r '.state' <<<"${pr_json}")"
            draft="$(jq -r '.isDraft' <<<"${pr_json}")"
            base_ref="$(jq -r '.baseRefName' <<<"${pr_json}")"
            head_sha="$(jq -r '.headRefOid // ""' <<<"${pr_json}")"
            mergeable="$(jq -r '.mergeable' <<<"${pr_json}")"
            merge_state_status="$(jq -r '.mergeStateStatus' <<<"${pr_json}")"
            review_decision="$(jq -r '.reviewDecision // ""' <<<"${pr_json}")"

            if [ "${author}" != "dependabot[bot]" ] && [ "${author}" != "dependabot" ] && [ "${author}" != "app/dependabot" ] && \
              [ "${author}" != "app/github-actions" ] && [ "${author}" != "github-actions" ] && [ "${author}" != "github-actions[bot]" ]; then
              skipped=$((skipped + 1))
              printf '| [#%s](%s) | skipped | Not an allowed automation pull request. |\n' "${pr_number}" "${url}" >> "${GITHUB_STEP_SUMMARY}"
              continue
            fi

            if [ "${state}" != "OPEN" ] || [ "${draft}" != "false" ] || [ "${base_ref}" != "${DEFAULT_BRANCH}" ]; then
              skipped=$((skipped + 1))
              printf "| [#%s](%s) | skipped | Not an open, ready pull request against \`%s\`. |\n" "${pr_number}" "${url}" "${DEFAULT_BRANCH}" >> "${GITHUB_STEP_SUMMARY}"
              continue
            fi

            if [ "${mergeable}" = "CONFLICTING" ] || [ "${merge_state_status}" = "DIRTY" ]; then
              skipped=$((skipped + 1))
              printf '| [#%s](%s) | skipped | Merge conflicts need manual attention. |\n' "${pr_number}" "${url}" >> "${GITHUB_STEP_SUMMARY}"
              continue
            fi

            validation_detail=''
            if [ -z "${head_sha}" ]; then
              skipped=$((skipped + 1))
              printf '| [#%s](%s) | skipped | Could not resolve the current PR head SHA. |\n' "${pr_number}" "${url}" >> "${GITHUB_STEP_SUMMARY}"
              continue
            fi

            if [ "${{ github.event_name }}" = "workflow_run" ]; then
              if [ "${TRIGGERING_HEAD_SHA:-}" != "${head_sha}" ]; then
                skipped=$((skipped + 1))
                printf '| [#%s](%s) | skipped | The successful workflow run was for an older PR head revision. |\n' "${pr_number}" "${url}" >> "${GITHUB_STEP_SUMMARY}"
                continue
              fi
              validation_detail=' Build and Validate succeeded for the current PR head revision via the triggering workflow run.'
            else
              validation_run="$(latest_build_validate_run "${head_sha}")"
              if [ -z "${validation_run}" ]; then
                skipped=$((skipped + 1))
                printf '| [#%s](%s) | skipped | No successful Build and Validate run was found for the current PR head revision. |\n' "${pr_number}" "${url}" >> "${GITHUB_STEP_SUMMARY}"
                continue
              fi

              validation_url="$(printf '%s' "${validation_run}" | base64 --decode | jq -r '.url // ""')"
              if [ -n "${validation_url}" ]; then
                validation_detail=" Verified against successful Build and Validate run ${validation_url}."
              else
                validation_detail=' Verified against a successful Build and Validate run for the current PR head revision.'
              fi
            fi

            approval_detail=''
            if [ "${review_decision}" != "APPROVED" ]; then
              if gh pr review "${pr_number}" --approve --body "Approved automatically after successful validation."; then
                approval_detail=' Review approval was added automatically before merge.'
              else
                approval_detail=' Review approval was not added, so the merge relied on the repository rules already being satisfied.'
              fi
            else
              approval_detail=' Review approval was already present before merge.'
            fi

            merge_body="$(
              printf '%s\n\n%s\n' \
                'Automatically merged after Build and Validate completed successfully for this automation pull request.' \
                "Original pull request: ${url}"
            )"

            merge_args=(
              --squash
              --delete-branch
              --match-head-commit "${head_sha}"
              --subject "${title}"
              --body "${merge_body}"
              "${pr_number}"
            )

            if merge_output="$(gh pr merge "${merge_args[@]}" 2>&1)"; then
              merged=$((merged + 1))
              detail="$(merge_result_detail "${title}" 'Merged' "${validation_detail}" "${approval_detail}")"
              printf '| [#%s](%s) | merged | %s |\n' "${pr_number}" "${url}" "$(escape_markdown "${detail}")" >> "${GITHUB_STEP_SUMMARY}"
            elif printf '%s' "${merge_output}" | grep -Fq 'without workflows permission'; then
              skipped=$((skipped + 1))
              if [ -n "${AUTOMATION_AUTOMERGE_TOKEN:-}" ]; then
                detail="GitHub rejected the merge because the configured automation auto-merge token does not have enough workflow permissions for this PR."
              else
                detail="This PR updates workflow files. Add an \`AUTOMATION_AUTOMERGE_TOKEN\` secret with repository contents, pull requests, and workflows write access to automate this class of PR."
              fi
              printf '| [#%s](%s) | skipped | %s |\n' "${pr_number}" "${url}" "$(escape_markdown "${detail}")" >> "${GITHUB_STEP_SUMMARY}"
            elif printf '%s' "${merge_output}" | grep -Fq "add the \`--auto\` flag"; then
              if auto_merge_output="$(gh pr merge --auto "${merge_args[@]}" 2>&1)"; then
                auto_merged=$((auto_merged + 1))
                detail="$(merge_result_detail "${title}" 'Enabled auto-merge' "${validation_detail}" "${approval_detail}")"
                printf '| [#%s](%s) | auto-merge | %s |\n' "${pr_number}" "${url}" "$(escape_markdown "${detail}")" >> "${GITHUB_STEP_SUMMARY}"
              else
                skipped=$((skipped + 1))
                detail="$(printf '%s' "${auto_merge_output}" | tail -n1)"
                printf '| [#%s](%s) | skipped | %s |\n' "${pr_number}" "${url}" "$(escape_markdown "${detail}")" >> "${GITHUB_STEP_SUMMARY}"
              fi
            else
              skipped=$((skipped + 1))
              detail="$(printf '%s' "${merge_output}" | tail -n1)"
              printf '| [#%s](%s) | skipped | %s |\n' "${pr_number}" "${url}" "$(escape_markdown "${detail}")" >> "${GITHUB_STEP_SUMMARY}"
            fi
          done <<< "${CANDIDATE_PRS}"

          printf '\nMerged: %s\n\nAuto-merge enabled: %s\n\nSkipped: %s\n' "${merged}" "${auto_merged}" "${skipped}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Report when no candidate pull requests were found
        if: steps.candidates.outputs.count == '0'
        run: |
          printf '## Automation Auto Merge\n\nNo open automation pull requests matched this run.\n' >> "${GITHUB_STEP_SUMMARY}"
