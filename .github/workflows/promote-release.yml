name: Promote Release Candidate

on:
  workflow_dispatch:
    inputs:
      prerelease_tag:
        description: Release candidate tag to promote, for example v2.1.0-rc.1
        required: true
        type: string

concurrency:
  group: promote-release
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  promote:
    name: Promote RC to Stable
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.prerelease_tag }}

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Validate prerelease tag
        id: promote
        run: |
          prerelease_tag="${{ inputs.prerelease_tag }}"
          default_branch="${{ github.event.repository.default_branch }}"

          if [[ ! "${prerelease_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            echo "Expected a prerelease tag like v2.1.0-rc.1, got: ${prerelease_tag}" >&2
            exit 1
          fi

          git rev-parse "${prerelease_tag}^{commit}" >/dev/null

          stable_tag="${prerelease_tag%-rc.*}"
          if git show-ref --verify --quiet "refs/tags/${stable_tag}"; then
            echo "Stable tag already exists: ${stable_tag}" >&2
            exit 1
          fi

          release_sha="$(git rev-parse "${prerelease_tag}^{commit}")"
          git fetch origin "refs/heads/${default_branch}:refs/remotes/origin/${default_branch}" --force
          git merge-base --is-ancestor "${release_sha}" "refs/remotes/origin/${default_branch}"

          {
            echo "prerelease_tag=${prerelease_tag}"
            echo "stable_tag=${stable_tag}"
            echo "release_sha=${release_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Create and push stable tag
        env:
          DEFAULT_GH_TOKEN: ${{ github.token }}
          RELEASE_AUTOMATION_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail

          push_token="${RELEASE_AUTOMATION_TOKEN:-${DEFAULT_GH_TOKEN}}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.promote.outputs.stable_tag }}" "${{ steps.promote.outputs.release_sha }}" \
            -m "Promote ${{ steps.promote.outputs.prerelease_tag }} to ${{ steps.promote.outputs.stable_tag }}"
          if ! git push "https://x-access-token:${push_token}@github.com/${GITHUB_REPOSITORY}.git" \
            "refs/tags/${{ steps.promote.outputs.stable_tag }}" 2>push.err; then
            cat push.err >&2
            if grep -Fq "without 'workflows' permission" push.err && [ -z "${RELEASE_AUTOMATION_TOKEN:-}" ]; then
              echo "Add a RELEASE_AUTOMATION_TOKEN secret with contents and workflows write access for automated release tags." >&2
            fi
            exit 1
          fi

      - name: Dispatch stable publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_AUTOMATION_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "${RELEASE_AUTOMATION_TOKEN:-}" ]; then
            echo "RELEASE_AUTOMATION_TOKEN is configured; tag push events should trigger release publishing."
            exit 0
          fi

          gh workflow run release-assets.yml \
            --ref "${{ steps.promote.outputs.stable_tag }}" \
            -f release_ref="${{ steps.promote.outputs.stable_tag }}"
          gh workflow run publish-apt-repository.yml \
            --ref "${{ steps.promote.outputs.stable_tag }}" \
            -f release_ref="${{ steps.promote.outputs.stable_tag }}"

      - name: Wait for stable publish workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/wait-for-tag-workflow-runs.sh \
            "${{ steps.promote.outputs.stable_tag }}" \
            "${{ steps.promote.outputs.release_sha }}" \
            release-assets.yml \
            publish-apt-repository.yml

      - name: Write workflow summary
        run: |
          printf "Promoted \`%s\` to stable tag \`%s\`.\n" \
            "${{ steps.promote.outputs.prerelease_tag }}" \
            "${{ steps.promote.outputs.stable_tag }}" >> "${GITHUB_STEP_SUMMARY}"
