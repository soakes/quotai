name: Deploy Pages Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-pages-site
  cancel-in-progress: true

permissions:
  contents: read

env:
  WEBSITE_DIR: .github/assets/website

jobs:
  build:
    name: Build Pages Site
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pages: write
    outputs:
      published: ${{ steps.published.outputs.published }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Restore durable repository snapshot branch
        id: snapshot_branch
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          path: published-site
          persist-credentials: false
          ref: pages-snapshot

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Resolve latest published repository snapshot fallback
        id: published
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_json="$(gh run list \
            --workflow publish-apt-repository.yml \
            --status success \
            --limit 1 \
            --json databaseId,headBranch,headSha,createdAt)"

          run_id="$(printf '%s' "${run_json}" | jq -r '.[0].databaseId // empty')"
          if [ -z "${run_id}" ]; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "No stable APT repository publish has completed yet." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "published=true"
            echo "run_id=${run_id}"
          } >> "$GITHUB_OUTPUT"

      - name: Restore latest published repository snapshot
        if: steps.published.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf pages-artifact site
          mkdir -p site

          if [ "${{ steps.snapshot_branch.outcome }}" = "success" ]; then
            rsync -a --delete --exclude '.git' published-site/ site/
          else
            mkdir -p pages-artifact
            gh run download "${{ steps.published.outputs.run_id }}" -n github-pages -D pages-artifact
            tar -xf pages-artifact/artifact.tar -C site
          fi

          test -f site/dists/stable/InRelease
          test -f site/quotai-archive-keyring.gpg
          test -f site/quotai-archive-keyring.fingerprint.txt
          test -f site/website-metadata.json

      - name: Refresh published website metadata
        id: website_metadata
        if: steps.published.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          stable_tag="$(jq -r '.release_version // empty' site/website-metadata.json)"
          if ! [[ "${stable_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "published website metadata does not contain a stable tag: ${stable_tag}" >&2
            exit 1
          fi

          stable_sha="$(git rev-list -n1 "${stable_tag}")"
          stable_build_date="$(jq -r '.build_date // empty' site/website-metadata.json)"
          if [ -z "${stable_build_date}" ] || [ "${stable_build_date}" = "null" ]; then
            stable_build_date="$(gh release view "${stable_tag}" --json publishedAt --jq .publishedAt)"
          fi

          fingerprint="$(tr '\n' ' ' < site/quotai-archive-keyring.fingerprint.txt | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//')"
          highlights_json="$(
            bash scripts/generate-website-highlights.sh "${stable_tag}" \
              | jq -Rsc 'split("\n") | map(select(length > 0))'
          )"

          jq -n \
            --arg site_url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" \
            --arg release_version "${stable_tag}" \
            --arg commit "${stable_sha}" \
            --arg build_date "${stable_build_date}" \
            --arg apt_fingerprint "${fingerprint}" \
            --argjson release_highlights "${highlights_json}" \
            '{
              site_url: $site_url,
              release_version: $release_version,
              commit: $commit,
              build_date: $build_date,
              apt_fingerprint: $apt_fingerprint,
              release_highlights: $release_highlights
            }' > site/website-metadata.json

          {
            echo "release_highlights_json=${highlights_json}"
            echo "stable_tag=${stable_tag}"
            echo "stable_sha=${stable_sha}"
            echo "stable_build_date=${stable_build_date}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.published.outputs.published == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ env.WEBSITE_DIR }}/package-lock.json

      - name: Build landing site
        if: steps.published.outputs.published == 'true'
        env:
          PUBLIC_RELEASE_HIGHLIGHTS_JSON: ${{ steps.website_metadata.outputs.release_highlights_json }}
        run: |
          npm ci --prefix "${WEBSITE_DIR}"
          make website-build \
            WEBSITE_DIR="${WEBSITE_DIR}" \
            SITE_URL=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/ \
            SITE_RELEASE_VERSION="${{ steps.website_metadata.outputs.stable_tag }}" \
            SITE_COMMIT="${{ steps.website_metadata.outputs.stable_sha }}" \
            SITE_BUILD_DATE="${{ steps.website_metadata.outputs.stable_build_date }}" \
            SITE_APT_FINGERPRINT="$(jq -r '.apt_fingerprint' site/website-metadata.json)"
          cp -a "${WEBSITE_DIR}/dist/." site/
          test -f site/index.html
          test -f site/dists/stable/InRelease
          test -f site/website-metadata.json

      - name: Publish durable Pages snapshot branch
        if: steps.published.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN || github.token }}
        run: |
          snapshot_root="$(mktemp -d)"
          trap 'rm -rf "${snapshot_root}"' EXIT
          git init -q "${snapshot_root}"
          cd "${snapshot_root}"
          git checkout --orphan pages-snapshot
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp -a "${GITHUB_WORKSPACE}/site/." .
          git add --all
          git commit -m "pages: snapshot ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin HEAD:pages-snapshot

      - name: Upload Pages artifact
        if: steps.published.outputs.published == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy Pages Site
    if: needs.build.outputs.published == 'true'
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
