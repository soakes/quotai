name: Build and Validate

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Check automation files
        run: |
          bash -n scripts/generate-release-notes.sh
          bash -n scripts/next-release.sh
          bash -n scripts/wait-for-tag-workflow-runs.sh
          ruby -e 'require "yaml"; ARGV.each { |path| YAML.load_file(path) }' \
            .github/dependabot.yml \
            .github/release-drafter.yml \
            .github/workflows/automated-release.yml \
            .github/workflows/automation-auto-merge.yml \
            .github/workflows/build-and-validate.yml \
            .github/workflows/promote-release.yml \
            .github/workflows/release-assets.yml \
            .github/workflows/release-drafter.yml

      - name: Check formatting
        run: make fmt-check

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Smoke test CLI
        run: make smoke

      - name: Build package
        run: make build

  compatibility:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs:
      - quality
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install .

      - name: Run tests
        run: make test

      - name: Smoke test installed CLI
        run: quotai --version
