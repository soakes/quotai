version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    open-pull-requests-limit: 10
    schedule:
      interval: daily
    allow:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: pip
    directory: /
    open-pull-requests-limit: 10
    schedule:
      interval: daily
    allow:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
      - python

  - package-ecosystem: npm
    directory: /.github/assets/website
    open-pull-requests-limit: 10
    schedule:
      interval: daily
    allow:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
      - website
