name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE ([#$NUMBER]($URL))"
change-title-escapes: '\<*_&@`'
exclude-labels:
  - skip-changelog
categories:
  - title: "Breaking Changes"
    labels:
      - breaking
  - title: "Features"
    labels:
      - enhancement
  - title: "Fixes"
    labels:
      - bug
  - title: "Packaging and Delivery"
    labels:
      - packaging
  - title: "Release Workflow"
    labels:
      - release
  - title: "CI and Automation"
    labels:
      - ci
      - github-actions
  - title: "Dependencies"
    collapse-after: 3
    labels:
      - dependencies
  - title: "Documentation"
    labels:
      - documentation
      - website
  - title: "Maintenance"
    labels:
      - maintenance
version-resolver:
  # Documentation, CI, website, and maintenance labels can still appear in
  # grouped release notes when they ship alongside release-bearing work, but
  # `scripts/next-release.sh` is the gating source of truth for whether a new
  # draft or tag should exist at all.
  major:
    labels:
      - breaking
  minor:
    labels:
      - enhancement
  patch:
    labels:
      - bug
      - dependencies
      - packaging
      - release
      - security
  default: patch
autolabeler:
  - label: breaking
    title:
      - '/^[A-Za-z0-9][A-Za-z0-9-]*(\([^)]+\))?!:/'
    body:
      - '/BREAKING CHANGE:/'
  - label: enhancement
    title:
      - '/^feat(\([^)]+\))?:/i'
    branch:
      - '/^feat\/.+/'
      - '/^feature\/.+/'
  - label: bug
    title:
      - '/^(fix|perf|revert)(\([^)]+\))?:/i'
    branch:
      - '/^fix\/.+/'
      - '/^bugfix\/.+/'
  - label: documentation
    title:
      - '/^docs(\([^)]+\))?:/i'
    files:
      - "README.md"
      - "docs/**/*"
      - "**/*.md"
      - "debian/*.1"
  - label: ci
    title:
      - '/^ci(\([^)]+\))?:/i'
      - '/^fix\(ci\):/i'
  - label: release
    title:
      - '/^fix\(release\):/i'
      - '/^release(\([^)]+\))?:/i'
    files:
      - "scripts/check-version-consistency.sh"
      - "scripts/next-release.sh"
      - "scripts/generate-release-notes.sh"
      - "scripts/generate-website-highlights.sh"
      - "scripts/wait-for-tag-workflow-runs.sh"
      - ".github/release-drafter.yml"
      - ".github/workflows/automated-release.yml"
      - ".github/workflows/promote-release.yml"
      - ".github/workflows/publish-apt-repository.yml"
      - ".github/workflows/release-assets.yml"
  - label: dependencies
    branch:
      - '/^dependabot\/.+/'
    title:
      - '/^(deps|build)(\([^)]+\))?: bump /i'
      - '/^chore: refresh /i'
  - label: github-actions
    files:
      - ".github/workflows/**/*"
      - ".github/dependabot.yml"
  - label: python
    files:
      - "quotai.py"
      - "tests/**/*"
      - "pyproject.toml"
  - label: packaging
    title:
      - '/^(packaging|build)(\([^)]+\))?:/i'
    files:
      - "debian/**/*"
      - "scripts/build-apt-repository.sh"
      - "scripts/prepare-debian-changelog.sh"
      - "scripts/update-debian-changelog.sh"
      - "scripts/update-release-metadata.sh"
      - ".github/workflows/publish-apt-repository.yml"
  - label: website
    title:
      - '/^website(\([^)]+\))?:/i'
    files:
      - ".github/assets/website/**/*"
      - ".github/workflows/deploy-pages-site.yml"
  - label: maintenance
    title:
      - '/^(chore|refactor|test)(\([^)]+\))?:/i'
template: |
  ## Included Changes

  $CHANGES

  ## Published Artifacts

  - `quotai-$RESOLVED_VERSION.tar.gz`
  - Debian package `quotai_$RESOLVED_VERSION-1_all.deb` and Debian source package files
  - Stable releases also publish the signed GitHub Pages APT repository
  - `sha256sums.txt`
