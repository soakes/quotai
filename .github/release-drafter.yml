name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE ([#$NUMBER]($URL))"
change-title-escapes: '\<*_&@`'
exclude-labels:
  - skip-changelog
categories:
  - title: "Breaking Changes"
    labels:
      - breaking
  - title: "Features"
    labels:
      - enhancement
  - title: "Fixes"
    labels:
      - bug
  - title: "Release Workflow"
    labels:
      - release
  - title: "CI and Automation"
    labels:
      - ci
      - github-actions
  - title: "Dependencies"
    collapse-after: 3
    labels:
      - dependencies
  - title: "Documentation"
    labels:
      - documentation
  - title: "Maintenance"
    labels:
      - maintenance
version-resolver:
  major:
    labels:
      - breaking
  minor:
    labels:
      - enhancement
  patch:
    labels:
      - bug
      - dependencies
      - release
      - security
  default: patch
autolabeler:
  - label: breaking
    title:
      - '/^[A-Za-z0-9][A-Za-z0-9-]*(\([^)]+\))?!:/'
    body:
      - '/BREAKING CHANGE:/'
  - label: enhancement
    title:
      - '/^feat(\([^)]+\))?:/i'
    branch:
      - '/^feat\/.+/'
      - '/^feature\/.+/'
  - label: bug
    title:
      - '/^(fix|perf|revert)(\([^)]+\))?:/i'
    branch:
      - '/^fix\/.+/'
      - '/^bugfix\/.+/'
  - label: documentation
    title:
      - '/^docs(\([^)]+\))?:/i'
    files:
      - "README.md"
      - "docs/**/*"
      - "**/*.md"
  - label: ci
    title:
      - '/^ci(\([^)]+\))?:/i'
      - '/^fix\(ci\):/i'
  - label: release
    title:
      - '/^fix\(release\):/i'
      - '/^release(\([^)]+\))?:/i'
    files:
      - "scripts/next-release.sh"
      - "scripts/generate-release-notes.sh"
      - "scripts/wait-for-tag-workflow-runs.sh"
      - ".github/release-drafter.yml"
      - ".github/workflows/automated-release.yml"
      - ".github/workflows/promote-release.yml"
      - ".github/workflows/release-assets.yml"
  - label: dependencies
    branch:
      - '/^dependabot\/.+/'
    title:
      - '/^(deps|build)(\([^)]+\))?: bump /i'
      - '/^chore: refresh /i'
  - label: github-actions
    files:
      - ".github/workflows/**/*"
      - ".github/dependabot.yml"
  - label: python
    files:
      - "quotai.py"
      - "tests/**/*"
      - "pyproject.toml"
  - label: maintenance
    title:
      - '/^(chore|refactor|test)(\([^)]+\))?:/i'
template: |
  ## Included Changes

  $CHANGES

  ## Published Artifacts

  - `quotai-$RESOLVED_VERSION.tar.gz`
  - `sha256sums.txt`
